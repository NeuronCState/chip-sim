name: Test Windows QEMU Sources

on:
  workflow_dispatch:

jobs:
  test-qemu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Source 1 - qemu.weilnetz.de
        shell: bash
        run: |
          echo "=== 源1: qemu.weilnetz.de (官方) ==="
          curl -L -f -o /tmp/qemu1.exe --max-time 60 "https://qemu.weilnetz.de/w64/2024/qemu-w64-setup-20241212.exe" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu1.exe)" || echo "下载失败"
          echo ""

      - name: Test Source 2 - cloudbase.it mirror
        shell: bash
        run: |
          echo "=== 源2: cloudbase.it ==="
          curl -L -f -o /tmp/qemu2.msi --max-time 60 "https://cloudbase.it/downloads/qemu-w64-setup-20241212.exe" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu2.msi)" || echo "下载失败"
          echo ""

      - name: Test Source 3 - Fedora COPR
        shell: bash
        run: |
          echo "=== 源3: GitHub qemu-virgil releases ==="
          curl -L -f -o /tmp/qemu3.zip --max-time 60 "https://github.com/niclas-2209/qemu-win64-portable/releases/download/v8.2.0-1/qemu-8.2.0-win64.7z" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu3.zip)" || echo "下载失败"
          echo ""

      - name: Test Source 4 - GitHub QEMU official mirror
        shell: bash
        run: |
          echo "=== 源4: GitHub actions cache ==="
          curl -L -f -o /tmp/qemu4.zip --max-time 60 "https://github.com/niclas-2209/qemu-win64-portable/releases/download/v9.0.0-1/qemu-9.0.0-win64.7z" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu4.zip)" || echo "下载失败"
          echo ""

      - name: Test Source 5 - scoop-like portable
        shell: bash
        run: |
          echo "=== 源5: GitHub qemu-v9 ==="
          curl -L -f -o /tmp/qemu5.7z --max-time 60 "https://github.com/niclas-2209/qemu-win64-portable/releases/download/v9.1.0-1/qemu-9.1.0-win64.7z" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu5.7z)" || echo "下载失败"
          echo ""

      - name: Test Source 6 - direct exe from weilnetz
        shell: bash
        run: |
          echo "=== 源6: 直接 exe (旧版) ==="
          curl -L -f -o /tmp/qemu6.exe --max-time 60 "https://qemu.weilnetz.de/w64/2023/qemu-w64-setup-20231219.exe" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu6.exe)" || echo "下载失败"
          echo ""

      - name: Test Source 7 - msys2
        shell: bash
        run: |
          echo "=== 源7: msys2 仓库 ==="
          curl -L -f -o /tmp/qemu7.pkg.tar.zst --max-time 60 "https://mirror.msys2.org/mingw/mingw64/mingw-w64-x86_64-qemu-8.2.0-2-any.pkg.tar.zst" 2>&1 && echo "下载成功: $(ls -lh /tmp/qemu7.pkg.tar.zst)" || echo "下载失败"
          echo ""

      - name: Summary
        shell: bash
        run: |
          echo "=== 测试结果汇总 ==="
          echo "可用的下载源:"
          for f in /tmp/qemu1.exe /tmp/qemu2.msi /tmp/qemu3.zip /tmp/qemu4.zip /tmp/qemu5.7z /tmp/qemu6.exe /tmp/qemu7.pkg.tar.zst; do
            if [ -f "$f" ]; then
              SIZE=$(stat --format=%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 1000000 ]; then
                echo "  可用: $f ($(ls -lh "$f" | awk '{print $5}'))"
              else
                echo "  文件太小: $f (${SIZE} bytes)"
              fi
            fi
          done
