name: Test Windows QEMU Sources

on:
  workflow_dispatch:

jobs:
  test-qemu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test winget
        shell: bash
        run: |
          echo "=== winget ==="
          winget install --id SoftwareFreedomConservancy.QEMU -e --accept-package-agreements --accept-source-agreements 2>&1 || echo "winget 失败"
          ls "/c/Program Files/qemu/qemu-system-arm.exe" 2>/dev/null && echo "winget 成功" || echo "winget 未找到文件"
          echo ""

      - name: Test direct curl (no -f)
        shell: bash
        run: |
          echo "=== 直接下载测试 (不加 -f 看状态码) ==="
          curl -L -o /tmp/qemu1.exe --max-time 120 "https://qemu.weilnetz.de/w64/2024/qemu-w64-setup-20241212.exe" 2>&1
          echo "状态码: $?"
          ls -lh /tmp/qemu1.exe 2>/dev/null || echo "文件不存在"
          echo ""

      - name: Test GitHub releases API
        shell: bash
        run: |
          echo "=== 查找 qemu-win64-portable releases ==="
          curl -s "https://api.github.com/repos/niclas-2209/qemu-win64-portable/releases/latest" | head -50
          echo ""

      - name: Test scoop
        shell: bash
        run: |
          echo "=== scoop ==="
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin" 2>/dev/null || true
          scoop install qemu 2>&1 || echo "scoop 失败"
          echo ""

      - name: Locate qemu after all attempts
        shell: bash
        run: |
          echo "=== 搜索系统中的 qemu ==="
          find /c/Program\ Files -name "qemu-system-arm*" 2>/dev/null | head -5
          find /c/Users -name "qemu-system-arm*" 2>/dev/null | head -5
          which qemu-system-arm 2>/dev/null || echo "PATH 中未找到"
